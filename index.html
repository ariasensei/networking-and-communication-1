  <script src="/_sdk/0e8f359d3c23f6d5.editing_sdk.js" integrity="sha512-CBLuYm/olmgyMedTtPRFeqCRZcSWUh6/39ewyXAbnr1dsVHBACzZ59KGJZXvuWNHOHixfWegfuMN9JzmLEDIoA=="></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();

      const views = [...document.querySelectorAll(".lesson-view")];
      const navButtons = [...document.querySelectorAll(".nav-button")];
      const progress = document.getElementById("progress-bar");
      const progressCount = document.getElementById("progress-count");

      navButtons.forEach((button, index) => {
        button.addEventListener("click", () => {
          const selected = button.dataset.view;

          navButtons.forEach((item) => {
            item.classList.remove("active");
            item.removeAttribute("aria-current");
          });

          button.classList.add("active");
          button.setAttribute("aria-current", "page");

          views.forEach((view) => {
            view.classList.toggle("active", view.id === selected);
          });

          progress.style.width = `${((index + 1) / navButtons.length) * 100}%`;
          progressCount.textContent = `${index + 1} / ${navButtons.length}`;
        });
      });

      const correctAnswers = {
        "Online class": "digital",
        "Printed memo": "traditional",
        "GCash receipt": "digital",
        "Face-to-face consultation": "traditional"
      };

      document.querySelectorAll(".activity-option").forEach((button) => {
        button.addEventListener("click", () => {
          const row = button.closest(".sorting-row");
          const item = button.dataset.item;
          const selectedAnswer = button.dataset.answer;
          const isCorrect = correctAnswers[item] === selectedAnswer;

          row.querySelectorAll(".activity-option").forEach((option) => {
            option.classList.remove("correct", "wrong");
            option.disabled = true;
          });

          button.classList.add(isCorrect ? "correct" : "wrong");

          if (!isCorrect) {
            row.querySelector(`[data-answer="${correctAnswers[item]}"]`).classList.add("correct");
          }

          document.getElementById("sorting-feedback").textContent = isCorrect
            ? "Correct classification."
            : `Review: ${item} is a ${correctAnswers[item]} form of communication.`;
        });
      });

      const hardwareInfo = {
        computer: ["Computer", "An end device used by students and staff to access learning platforms, files, printers, cloud apps, and the internet."],
        nic: ["Network Interface Card", "The NIC lets a desktop or laptop send and receive data through Ethernet or Wi-Fi."],
        switch: ["Switch", "A switch connects many devices within the same local network, such as the computers in a laboratory."],
        router: ["Router", "A router connects separate networks and directs data between the campus network and the internet."],
        "access-point": ["Access Point", "An access point provides Wi-Fi coverage so mobile devices can join the local network."],
        ethernet: ["Ethernet Cable", "Ethernet cable creates stable wired connections between devices, switches, routers, and wall ports."],
        modem: ["Modem or ONT", "This device links the local network to the internet service provider’s connection, such as fiber internet."],
        server: ["Server", "A server provides shared services such as user accounts, file storage, websites, databases, or learning systems."]
      };

      document.querySelectorAll(".hardware-button").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".hardware-button").forEach((item) => item.classList.remove("selected"));
          button.classList.add("selected");

          const detail = hardwareInfo[button.dataset.hardware];
          document.getElementById("hardware-name").textContent = detail[0];
          document.getElementById("hardware-description").textContent = detail[1];
        });
      });

      const checks = [...document.querySelectorAll(".activity-check")];
      const checklistFeedback = document.getElementById("checklist-feedback");

      checks.forEach((check) => {
        check.addEventListener("change", () => {
          const completed = checks.filter((item) => item.checked).length;
          checklistFeedback.textContent = completed === checks.length
            ? "Excellent. Your group is ready to draw and explain its network plan."
            : `${completed} of ${checks.length} planning requirements completed.`;
        });
      });

      document.getElementById("reset-checklist").addEventListener("click", () => {
        checks.forEach((check) => { check.checked = false; });
        checklistFeedback.textContent = "";
      });

      const individualChecks = [...document.querySelectorAll(".individual-check")];
      const individualFeedback = document.getElementById("individual-feedback");

      individualChecks.forEach((check) => {
        check.addEventListener("change", () => {
          const completed = individualChecks.filter((item) => item.checked).length;
          individualFeedback.textContent = completed === individualChecks.length
            ? "Excellent. You have reflected on all key networking concepts."
            : `${completed} of ${individualChecks.length} reflection items completed.`;
        });
      });

      document.getElementById("reset-individual-checklist").addEventListener("click", () => {
        individualChecks.forEach((check) => { check.checked = false; });
        individualFeedback.textContent = "";
      });

      const quizAnswers = {
        one: "b",
        two: "c",
        three: "a"
      };

      const quizFeedback = {
        one: "Correct. A network is made of connected devices that share data, resources, or services.",
        two: "Correct. The switch connects devices inside the same local network.",
        three: "Correct. A network interface card enables a computer to communicate through a network."
      };

      document.querySelectorAll(".quiz-option").forEach((button) => {
        button.addEventListener("click", () => {
          const question = button.dataset.question;
          const choice = button.dataset.choice;
          const card = button.closest(".canva-card");
          const isCorrect = quizAnswers[question] === choice;

          card.querySelectorAll(".quiz-option").forEach((option) => {
            option.disabled = true;
            option.classList.remove("correct", "wrong");
          });

          button.classList.add(isCorrect ? "correct" : "wrong");

          if (!isCorrect) {
            card.querySelector(`[data-question="${question}"][data-choice="${quizAnswers[question]}"]`).classList.add("correct");
          }

          document.getElementById(`quiz-feedback-${question}`).textContent = isCorrect
            ? quizFeedback[question]
            : `Not quite. ${quizFeedback[question]}`;
        });
      });
    });
  </script>
